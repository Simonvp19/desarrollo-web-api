<body class="d-flex flex-column min-vh-100">
<main class="flex-fill">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">Desarrollo Web</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>

<section class="container py-5 mt-5">
<h1 class="mb-4 text-center">Formulario de Contacto</h1>

<form id="formulario" class="needs-validation" novalidate>

<div class="row">
<div class="col-md-6 mb-3">
<label>Nombre completo</label>
<input type="text" class="form-control" id="nombre" required>
<div class="invalid-feedback">Ingrese su nombre.</div>
</div>

<div class="col-md-6 mb-3">
<label>Correo electrónico</label>
<input type="email" class="form-control" id="correo" required>
<div class="invalid-feedback">Ingrese un correo válido.</div>
</div>

<div class="col-md-6 mb-3">
<label>Teléfono</label>
<input type="text" class="form-control" id="telefono" required>
<div class="invalid-feedback">Ingrese su teléfono.</div>
</div>

<div class="col-md-6 mb-3">
<label>Asunto</label>
<input type="text" class="form-control" id="asunto" required>
<div class="invalid-feedback">Ingrese el asunto.</div>
</div>

<div class="col-12 mb-3">
<label>Mensaje</label>
<textarea class="form-control" id="mensaje" rows="4" required></textarea>
<div class="invalid-feedback">Ingrese un mensaje.</div>
</div>

<button class="btn btn-primary w-100">Enviar</button>
</div>

</form>

</section>

<footer class="bg-dark text-white text-center p-3">
© 2026 - Desarrollo Web
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
'use strict'
const forms = document.querySelectorAll('.needs-validation')
Array.from(forms).forEach(form => {
form.addEventListener('submit', event => {
if (!form.checkValidity()) {
event.preventDefault()
event.stopPropagation()
}
form.classList.add('was-validated')
}, false)
})
})()
</script>

</body>
</html>
